<header class="site-header">
  <nav class="nav">
    <a class="site-title" href="{{ "/" | relURL }}">{{ .Site.Params.author }}</a>
    <ul class="nav-links">
      {{ range .Site.Menus.main }}
        <li><a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </nav>
</header>
